<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Seite nicht gefunden | ALGATEC Solar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a1628;
            --accent: #F5A623;
            --secondary: #22C55E;
            --text-light: #f0f0f0;
            --text-muted: #a0a0a0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2847 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background elements */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-rays {
            position: absolute;
            width: 300px;
            height: 300px;
            opacity: 0.05;
        }

        .ray {
            position: absolute;
            background: var(--accent);
            transform-origin: center;
        }

        .ray1 {
            width: 2px;
            height: 150px;
            left: 50%;
            top: 50%;
            margin-left: -1px;
            margin-top: -75px;
            animation: float 6s ease-in-out infinite;
        }

        .ray2 {
            width: 2px;
            height: 150px;
            left: 50%;
            top: 50%;
            margin-left: -1px;
            margin-top: -75px;
            transform: rotate(45deg);
            animation: float 7s ease-in-out infinite 0.5s;
        }

        .ray3 {
            width: 2px;
            height: 150px;
            left: 50%;
            top: 50%;
            margin-left: -1px;
            margin-top: -75px;
            transform: rotate(90deg);
            animation: float 8s ease-in-out infinite 1s;
        }

        .ray4 {
            width: 2px;
            height: 150px;
            left: 50%;
            top: 50%;
            margin-left: -1px;
            margin-top: -75px;
            transform: rotate(135deg);
            animation: float 6.5s ease-in-out infinite 0.25s;
        }

        @keyframes float {
            0%, 100% { opacity: 0.05; }
            50% { opacity: 0.15; }
        }

        /* Header with logo */
        header {
            padding: 1.5rem 2rem;
            position: relative;
            z-index: 10;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .logo img {
            height: 40px;
            width: auto;
        }

        .company-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text, #ffffff);
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 100%);
            border-radius: 4px;
        }

        /* Main content */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 5;
        }

        .container {
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
        }

        /* 404 Number */
        .error-number {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(120px, 25vw, 280px);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent) 0%, #ff8c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(245, 166, 35, 0.3));
            margin-bottom: 1rem;
            animation: pulse 3s ease-in-out infinite;
            letter-spacing: -0.05em;
        }

        @keyframes pulse {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(245, 166, 35, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(245, 166, 35, 0.6));
            }
        }

        /* Solar illustration */
        .solar-illustration {
            margin: 2rem 0;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: slideUp 0.9s ease-out 0.1s both;
        }

        .sun-container {
            position: relative;
            width: 150px;
            height: 150px;
        }

        .sun {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--accent) 0%, #ff8c00 100%);
            border-radius: 50%;
            left: 25px;
            top: 25px;
            filter: drop-shadow(0 0 30px rgba(245, 166, 35, 0.4));
            animation: sway 4s ease-in-out infinite;
        }

        .sun-rays {
            position: absolute;
            width: 150px;
            height: 150px;
            animation: rotate 20s linear infinite;
        }

        .sun-ray {
            position: absolute;
            width: 3px;
            height: 20px;
            background: var(--accent);
            left: 73.5px;
            top: 0;
            opacity: 0.6;
            border-radius: 2px;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes sway {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Cloud/Roof covering sun */
        .cloud {
            position: absolute;
            width: 140px;
            height: 70px;
            background: linear-gradient(135deg, rgba(26, 40, 71, 0.8) 0%, rgba(42, 62, 105, 0.8) 100%);
            border-radius: 50px;
            right: 0;
            bottom: 40px;
            animation: slideIn 1s ease-out 0.3s both;
            border: 2px solid var(--secondary);
        }

        @keyframes slideIn {
            from {
                right: -150px;
                opacity: 0;
            }
            to {
                right: 0;
                opacity: 1;
            }
        }

        /* Headlines */
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(1.5rem, 6vw, 3rem);
            font-weight: 700;
            margin: 1rem 0;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .headline-accent {
            color: var(--secondary);
        }

        .subtitle {
            font-size: clamp(0.95rem, 2vw, 1.1rem);
            color: var(--text-muted);
            margin: 1.5rem 0 2.5rem 0;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        /* Links section */
        .links-section {
            margin-top: 3rem;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .link-card {
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(245, 166, 35, 0.3);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-light);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(245, 166, 35, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .link-card:hover::before {
            left: 100%;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(245, 166, 35, 0.2);
        }

        .link-icon {
            font-size: 1.8rem;
            color: var(--accent);
        }

        .link-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            text-align: center;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            main {
                padding: 1rem;
            }

            .error-number {
                margin-bottom: 0.5rem;
            }

            .solar-illustration {
                height: 150px;
                margin: 1.5rem 0;
            }

            .links-grid {
                grid-template-columns: 1fr;
            }

            header {
                padding: 1rem;
            }
        }

        @media (max-width: 480px) {
            .subtitle {
                font-size: 0.9rem;
            }

            .link-card {
                padding: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background animations -->
    <div class="background-animation">
        <div class="floating-rays">
            <div class="ray ray1"></div>
            <div class="ray ray2"></div>
            <div class="ray ray3"></div>
            <div class="ray ray4"></div>
        </div>
    </div>

    <!-- Header -->
    <header>
        <a href="index.html" class="logo">
            <img src="images/logo.png" alt="ALGATEC Solar Logo" width="40" height="40">
            <span class="company-name">ALGATEC Solar</span>
        </a>
    </header>

    <!-- Main content -->
    <main>
        <div class="container">
            <!-- 404 Number -->
            <div class="error-number">404</div>

            <!-- Solar illustration -->
            <div class="solar-illustration">
                <div class="sun-container">
                    <div class="sun-rays">
                        <div class="sun-ray" style="transform: rotate(0deg);"></div>
                        <div class="sun-ray" style="transform: rotate(30deg);"></div>
                        <div class="sun-ray" style="transform: rotate(60deg);"></div>
                        <div class="sun-ray" style="transform: rotate(90deg);"></div>
                        <div class="sun-ray" style="transform: rotate(120deg);"></div>
                        <div class="sun-ray" style="transform: rotate(150deg);"></div>
                    </div>
                    <div class="sun"></div>
                    <div class="cloud"></div>
                </div>
            </div>

            <!-- Headline -->
            <h1>Seite nicht gefunden</h1>

            <!-- Subtitle -->
            <p class="subtitle">Die Sonne scheint, aber diese Seite leider nicht. Vielleicht finden Sie was Sie suchen über die folgenden Links.</p>

            <!-- Quick links -->
            <div class="links-section">
                <div class="links-grid">
                    <a href="index.html" class="link-card">
                        <span class="link-icon">🏠</span>
                        <span class="link-text">Startseite</span>
                    </a>
                    <a href="solar-rechner.html" class="link-card">
                        <span class="link-icon">☀️</span>
                        <span class="link-text">Solar-Rechner</span>
                    </a>
                    <a href="blog.html" class="link-card">
                        <span class="link-icon">📝</span>
                        <span class="link-text">Blog</span>
                    </a>
                    <a href="index.html#contact" class="link-card">
                        <span class="link-icon">💬</span>
                        <span class="link-text">Kontakt</span>
                    </a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
